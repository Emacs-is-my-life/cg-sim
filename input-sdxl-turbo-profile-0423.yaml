--- # Actual SDXL Turbo PyTorch profile simulation

logger:
  args:
    result_path: "runs/sdxl-turbo-profile-0423/sim_result.json"
    log_level: 1

trace:
  type: "PytorchProfile"
  args:
    profile_dir: "/data/pytorch-source/sdxl-turbo-profile-0423"
    bundle_manifest: "llama_bundle/manifest.json"
    skip_zero_byte_tensors: true
    zero_wait_nodes: true
    add_temporal_data_control_edges: true

hardware:
  compute:
    - name: "cpu"
      type: "SimpleCPU"
      args:
        memory: "ram"
        modifier: 1

    - name: "gpu0"
      type: "SimpleGPU"
      args:
        memory: "vram0"
        modifier: 1
        max_concurrent_jobs: 1

  memory:
    # Cross-device TransferJobs water-fill at min(src, dst) of these
    # bandwidths. The bottleneck between RAM and VRAM in the real machine
    # is PCIe 4.0 x16 ≈ 25 GB/s, not the DDR / HBM internal bandwidth.
    # The simulator only emits TransferJobs across devices, so setting
    # both endpoints to the PCIe rate gives the correct bottleneck for
    # cross-device traffic without introducing a separate PCIe hw. Values
    # match /data/.../llama_bundle/hw_pcie4.json.
    - name: "ram"
      type: "SimpleRAM"
      args:
        memory_size_KB: 33554432
        memory_bandwidth_KBps: 25000000

    - name: "vram0"
      type: "SimpleVRAM"
      args:
        memory_size_KB: 24624320
        memory_bandwidth_KBps: 25000000

  storage:
    - name: "ssd"
      type: "SimpleSSD"
      args:
        fixed_latency_micros: 50
        read_io_curve_KBps:
          - [4, 80000]
          - [8, 160000]
          - [16, 320000]
          - [32, 800000]
          - [64, 1600000]
          - [128, 3000000]
          - [256, 5000000]
          - [512, 6500000]
          - [1024, 7000000]
        write_io_curve_KBps:
          - [4, 60000]
          - [8, 120000]
          - [16, 250000]
          - [32, 600000]
          - [64, 1200000]
          - [128, 2200000]
          - [256, 3500000]
          - [512, 4500000]
          - [1024, 5000000]

scheduler:
  type: "DeviceAwareVanilla"
  args:
    cpu_compute: "cpu"
    cuda_compute: "gpu0"
    cuda_device: "cuda:0"
