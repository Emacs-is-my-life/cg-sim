--- # Input parameters for cg-sim run

# Simulator configuration
logger:
  args:
    output_path: "sim_result.json"
    log_level: 2             # Events, Counters

# Trace(workload) loading
trace:
  type: "Llamacpp"
  args:
    # Provide path relative to current input.yaml file
    record_path: "ggml_profile_node_records.csv"
    graph_path: "step_0_compute_graph.dot"

# Hardware configuration
hardware:
  # Compute unit
  compute:
    - name: "cpu"            # Hardware name should be unique
      type: "SimpleCPU"
      args:
        memory: "ram"        # Name of local memory hardware
        modifier: 1

  # Memory unit
  memory:
    - name: "ram"
      type: "SimpleRAM"
      args:
        memory_size_KB: 6442450944    # 6 GB
        memory_bandwidth_KBps: 512000000

  # Storage unit
  storage:
    - name: "ssd"
      type: "SimpleSSD"
      args:
        fixed_latency_micros: 50
        # [<IO_size_in_KB>, <IO_bandwidth_in_KBps>]
        read_io_curve_KBps:
          - [4, 80000]       # ~80 MB/s (IOPS-limited)
          - [8, 160000]
          - [16, 320000]
          - [32, 800000]
          - [64, 1600000]
          - [128, 3000000]
          - [256, 5000000]
          - [512, 6500000]
          - [1024, 7000000]  # ~7 GB/s plateau
        write_io_curve_KBps:
          - [4, 60000]       # Writes usually a bit slower
          - [8, 120000]
          - [16, 250000]
          - [32, 600000]
          - [64, 1200000]
          - [128, 2200000]
          - [256, 3500000]
          - [512, 4500000]
          - [1024, 5000000]  # ~5 GB/s plateau

# Scheduler configuration
scheduler:
  type: "FlexInfer"
  args:
    foo: "bar"
